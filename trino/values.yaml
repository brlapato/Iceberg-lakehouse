# Trino — distributed SQL query engine
# Chart: trino/trino  v1.42.x  (app: Trino 480)
# Repo:  https://trinodb.github.io/charts
#
# Key notes for Trino 480:
#   - Iceberg REST catalog (Polaris): iceberg.catalog.type=rest
#   - S3 filesystem properties are catalog-scoped (stay in the catalog block)
#   - DataSize properties require human-readable format (e.g. "128MB")
#   - OAuth2 credential for Polaris is injected via the polaris-trino-credentials
#     K8s secret (created by scripts/init-polaris.sh) as POLARIS_OAUTH_CREDENTIAL.
#     Trino substitutes ${ENV:POLARIS_OAUTH_CREDENTIAL} at startup.

image:
  repository: trinodb/trino
  tag: ""
  pullPolicy: IfNotPresent

server:
  workers: 1
  node:
    environment: development
    dataDir: /data/trino
    pluginDir: /usr/lib/trino/plugin
  log:
    trino:
      level: INFO
  config:
    path: /etc/trino
    http:
      port: 8080
    query:
      maxMemory: "4GB"

coordinator:
  jvm:
    maxHeapSize: "3G"
    gcMethod:
      type: "UseG1GC"
      g1:
        heapRegionSize: "32M"
  config:
    query:
      maxMemoryPerNode: "1GB"
  resources:
    requests:
      cpu: 500m
      memory: 4Gi
    limits:
      cpu: 2
      memory: 5Gi

worker:
  jvm:
    maxHeapSize: "3G"
    gcMethod:
      type: "UseG1GC"
      g1:
        heapRegionSize: "32M"
  config:
    query:
      maxMemoryPerNode: "1GB"
  resources:
    requests:
      cpu: 500m
      memory: 4Gi
    limits:
      cpu: 2
      memory: 5Gi

# Environment variables injected into all Trino pods (coordinator + workers).
# Secrets and ConfigMap are created by `make credentials` and `make config`.
env:
  # Polaris OAuth2 credential written by init-polaris.sh. optional: true so
  # Trino starts even before polaris has been bootstrapped; catalog auth fails
  # until the secret exists.
  - name: POLARIS_OAUTH_CREDENTIAL
    valueFrom:
      secretKeyRef:
        name: polaris-trino-credentials
        key: oauth-credential
        optional: true
  - name: S3_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: s3-credentials
        key: access-key
  - name: S3_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: s3-credentials
        key: secret-key
  - name: S3_ENDPOINT
    valueFrom:
      configMapKeyRef:
        name: lakehouse-config
        key: s3-endpoint
  - name: POLARIS_CATALOG_URI
    valueFrom:
      configMapKeyRef:
        name: lakehouse-config
        key: polaris-catalog-uri
  - name: S3_BUCKET
    valueFrom:
      configMapKeyRef:
        name: lakehouse-config
        key: s3-bucket

# ---------------------------------------------------------------------------
# Catalogs
# ---------------------------------------------------------------------------
# "lakehouse" catalog: Iceberg tables via Apache Polaris REST catalog + SeaweedFS S3.
#
# All env-specific values (endpoints, credentials, bucket) are injected as
# Trino pod env vars and referenced below via ${ENV:*} substitution.
# The pod env vars are populated from K8s secrets and the lakehouse-config
# ConfigMap, both created by `make credentials` and `make config`.
#
# Credential vending is disabled — Trino manages its own S3 credentials
# directly (SeaweedFS uses static keys, not IAM roles).
# ---------------------------------------------------------------------------
catalogs:
  tpch: |
    connector.name=tpch
    tpch.splits-per-node=4
  lakehouse: |
    connector.name=iceberg
    iceberg.catalog.type=rest
    iceberg.rest-catalog.uri=${ENV:POLARIS_CATALOG_URI}
    iceberg.rest-catalog.warehouse=${ENV:S3_BUCKET}
    iceberg.rest-catalog.security=OAUTH2
    iceberg.rest-catalog.oauth2.credential=${ENV:POLARIS_OAUTH_CREDENTIAL}
    iceberg.rest-catalog.oauth2.scope=PRINCIPAL_ROLE:ALL
    iceberg.target-max-file-size=128MB
    iceberg.unique-table-location=true
    fs.native-s3.enabled=true
    s3.endpoint=${ENV:S3_ENDPOINT}
    s3.region=us-east-1
    s3.path-style-access=true
    s3.aws-access-key=${ENV:S3_ACCESS_KEY}
    s3.aws-secret-key=${ENV:S3_SECRET_KEY}

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false

# Access Trino Web UI:
#   kubectl port-forward -n lakehouse svc/trino 8080:8080
