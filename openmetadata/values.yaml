# OpenMetadata — metadata management and data discovery
# Chart: open-metadata/openmetadata
# Repo:  https://helm.open-metadata.org
#
# Most defaults already point to the correct service names from the
# openmetadata-dependencies chart (mysql, opensearch, openmetadata-dependencies-api-server).
# This file only overrides what differs from defaults.
#
# OIDC SSO: delegates user authentication to Keycloak.
#   Keycloak URL/realm set by 'make keycloak-config' (reads config/lakehouse-config.yaml).
#   Client secret stored in keycloak-openmetadata K8s secret (created by keycloak-secrets.sh).

replicaCount: 1

openmetadata:
  config:
    logLevel: INFO
    clusterName: openmetadata

    # ---------------------------------------------------------------------------
    # Authentication — Keycloak OIDC SSO
    # Run 'make keycloak-config' after editing config/lakehouse-config.yaml to propagate
    # the issuer URL and JWKS URL into this file.
    # ---------------------------------------------------------------------------
    authentication:
      provider: custom-oidc
      # JWKS endpoint — updated by 'make keycloak-config'
      publicKeys:
        - http://keycloak-keycloakx-http.auth.svc.cluster.local/auth/realms/lakehouse/protocol/openid-connect/certs
      # Issuer / authority — updated by 'make keycloak-config'
      authority: http://keycloak-keycloakx-http.auth.svc.cluster.local/auth/realms/lakehouse
      clientId: openmetadata
      # Redirect URI must match the Keycloak client's allowed redirect URIs
      callbackUrl: http://localhost:8585/callback
      clientType: confidential
      oidcConfiguration:
        # Client secret stored in K8s secret (created by scripts/keycloak-secrets.sh)
        clientSecret:
          secretRef: keycloak-openmetadata
          secretKey: client-secret

    # ---------------------------------------------------------------------------
    # Authorization — default JWT-based authorizer
    # ---------------------------------------------------------------------------
    authorizer:
      className: org.openmetadata.service.security.DefaultAuthorizer
      containerRequestFilter: org.openmetadata.service.security.JwtFilter
      # Users with admin privileges (must match 'preferred_username' in Keycloak JWT)
      initialAdmins:
        - admin
      principalDomain: open-metadata.org

    # OpenSearch (the chart defaults already set this correctly)
    elasticsearch:
      enabled: true
      host: opensearch
      searchType: opensearch
      port: 9200
      scheme: http

    # MySQL — secrets must exist before deployment (created by `make openmetadata`)
    database:
      enabled: true
      host: mysql
      port: 3306
      driverClass: com.mysql.cj.jdbc.Driver
      dbScheme: mysql
      databaseName: openmetadata_db
      auth:
        username: openmetadata_user
        # Secret created by Makefile: kubectl create secret generic mysql-secrets ...
        password:
          secretRef: mysql-secrets
          secretKey: openmetadata-mysql-password
      dbParams: "allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC"

    # Airflow REST API (LocalExecutor still exposes the API server)
    pipelineServiceClientConfig:
      enabled: true
      type: "airflow"
      metadataApiEndpoint: http://openmetadata:8585/api
      airflow:
        className: "org.openmetadata.service.clients.pipeline.airflow.AirflowRESTClient"
        apiEndpoint: http://openmetadata-dependencies-api-server:8080
        verifySsl: "no-ssl"
        healthCheckInterval: 300
        auth:
          enabled: true
          username: admin
          # Secret created by Makefile: kubectl create secret generic airflow-secrets ...
          password:
            secretRef: airflow-secrets
            secretKey: openmetadata-airflow-password

service:
  type: ClusterIP
  port: 8585
  adminPort: 8586

ingress:
  enabled: false

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2
    memory: 2Gi

# Access OpenMetadata UI:
#   kubectl port-forward -n lakehouse svc/openmetadata 8585:8585
#   Open http://localhost:8585  →  redirects to Keycloak login
